task: segmentation

data:
  dataset:
    name: PolSFDataset
    trainpath: ../../datasets/SAN_FRANCISCO_ALOS2
  batch_size: 64
  patch_size: 64
  patch_stride: 64
  num_workers: 2
  valid_ratio: 0.1
  test_ratio: 0.1

model:
  num_layers: 2
  channels_width: 8
  activation: modReLU
  layer_mode: complex
  normalization_layer: layer
  downsampling_layer: LPD
  upsampling_layer: LPU
  residual: true
  dropout: 0.1
  gumbel_tau:
    start_value: 10
    gamma: 0.1
    start_decay_epoch: 15
    min_value: 0.00001

  
loss:
  name: CrossEntropyLoss

# Logging configuration
logging:
  logdir: ./logs
  wandb:
    entity: equivariant_cvnn
    project: sf_alos2
    name: segmentation

nepochs: 50
mode: full
world_size: 4


# Optimizer configuration
optim:
  algo: AdamW
  params:
    lr: 0.0005 # Reduced from 0.0005 for more stable training
    weight_decay: 0.001 # Increased weight decay for better regularization
    betas: [0.9, 0.999]

# Scheduler configuration with ReduceLROnPlateau for adaptive learning
scheduler:
  name: ReduceLROnPlateau
  params:
    mode: min
    factor: 0.5
    patience: 5
    min_lr: 0.000001

# Warmup configuration
warmup:
  epochs: 5