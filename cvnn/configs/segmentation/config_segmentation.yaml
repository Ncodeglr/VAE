task: segmentation

data:
  recompute_statistics: True
  shuffle: True
  dataset:
    name: PolSFDataset
    trainpath: ../datasets/SAN_FRANCISCO_ALOS2
    patch_size: 64
    patch_stride: 64
  batch_size: 32
  num_workers: 2
  valid_ratio: 0.1
  test_ratio: 0.1
  transforms:
    - name: clamp
      params:
        max_val: 10.0
    - name: logamplitude

model:
  activation: CReLU
  channels_width: 64
  class: UNet
  layer_mode: complex
  num_layers: 2
  num_blocks: 1
  normalization_layer: layer
  downsampling_layer: Null
  upsampling_layer: nearest
  residual: True
  dropout: 0.0

  # Projection configuration - choose one of the following:
  
  # Option 1: Polynomial projection with custom order
  projection_layer: polynomial
  projection:
    order: 5  # Default is 3, this creates a 5th order polynomial
  
  # Option 2: MLP projection with custom architecture
  # projection_layer: MLP
  # projection:
  #   hidden_sizes: [8, 16, 8]  # Default is [8, 16]

  # Option 3: Amplitude projection (no additional config needed)
  # projection_layer: amplitude

  gumbel_tau:
    start_value: 1
    gamma: 0.1
    start_decay_epoch: 5
    min_value: 0.00001

loss:
  name: FocalLoss
  gamma: 2.5              # Reduced from 3.0 - too aggressive focusing prevents learning
  use_class_weights: true # Disable automatic weights - they conflict with ignore_index
  weight_mode: balanced   # Method for computing class weights


# Logging configuration
logging:
  logdir: ./logs
  wandb:
    entity: equivariant_cvnn
    project: sf_alos2
    name: segmentation