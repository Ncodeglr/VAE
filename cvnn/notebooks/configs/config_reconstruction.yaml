# Task-specific configuration for Reconstruction task
task: reconstruction

# Data configuration specific to reconstruction
data:
  batch_size: 32
  crop:
    end_col: 3200
    end_row: 7500
    start_col: 1000
    start_row: 3000
  dataset:
    name: ALOSDataset
    trainpath: ../../datasets/SAN_FRANCISCO_ALOS2
  num_workers: 4
  patch_size: 64
  patch_stride: 64
  test_ratio: 0.1
  valid_ratio: 0.1
                    
# Model configuration specific to reconstruction
model:
  activation: modReLU
  channels_ratio: 8
  class: AutoEncoder
  layer_mode: complex
  num_layers: 2
  normalization_layer: batch
  downsampling_layer: APD
  upsampling_layer: APU
  residual: True
  dropout: 0.0
  gumbel_tau:
    start_value: 0.001
    gamma: 0.1
    start_decay_epoch: 5
    min_value: 0.00001


# Override wandb project name for reconstruction
# Logging configuration
logging:
  logdir: ./logs
  wandb:
    entity: equivariant_cvnn
    project: sf_alos2
    name: reconstruction
# Loss configuration - using new generic naming
loss:
  name: MSE # Auto-selects ComplexMSELoss or MSELoss based on layer_mode

nepochs: 50
mode: full
world_size: 4

# # Early stopping to prevent overfitting
# early_stopping:
#   patience: 10
#   min_delta: 0.001
#   monitor: validation_loss

# Optimizer configuration
optim:
  algo: AdamW
  params:
    lr: 0.0005 # Reduced from 0.0005 for more stable training
    weight_decay: 0.001 # Increased weight decay for better regularization
    betas: [0.9, 0.999]

# Scheduler configuration with ReduceLROnPlateau for adaptive learning
scheduler:
  name: ReduceLROnPlateau
  params:
    mode: min
    factor: 0.5
    patience: 5
    min_lr: 0.000001

# Warmup configuration
warmup:
  epochs: 5