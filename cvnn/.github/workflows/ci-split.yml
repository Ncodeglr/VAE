name: CI split (smoke / full)

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests (fast)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies (poetry)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: Install runtime (poetry)
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run smoke tests
        run: pytest -q -m smoke

  full:
    name: Full test-suite
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Restore caches and install runtime (poetry)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: Install runtime (poetry)
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Install pytest-xdist (optional)
        run: |
          # xdist speeds up the full test-suite by running tests in parallel when available
          python -m pip install pytest-xdist || true

      - name: Run full tests
        run: |
          # Use 2 workers by default; override with CI_XDIST_WORKERS env var
          WORKERS=${CI_XDIST_WORKERS:-2}
          if pytest -q -n ${WORKERS}; then
            echo "Ran with pytest-xdist (workers=${WORKERS})"
          else
            echo "pytest-xdist not available or failed; running single-process pytest"
            pytest -q
          fi
