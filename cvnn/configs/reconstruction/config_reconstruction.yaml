# Task-specific configuration for Reconstruction task
task: reconstruction

# Data configuration specific to reconstruction
data:
  recompute_statistics: True
  shuffle: True
  batch_size: 16
  dataset:
    # name: MNIST
    # trainpath: ../datasets/MNIST
    # name: ALOSDataset
    # trainpath: ../datasets/SAN_FRANCISCO_ALOS2
    # patch_size: 64
    # patch_stride: 64
    # crop_coordinates:
    #   end_col: 3200
    #   end_row: 7500
    #   start_col: 1000
    #   start_row: 3000
    name: MSTARTargets
    trainpath: ../datasets/MSTAR2

    # name: Bretigny
    # trainpath: ../datasets/Bretigny
    # name: Sethi
    # trainpath: ../datasets/Sethi
  num_workers: 4
  test_ratio: 0.1
  valid_ratio: 0.1
  transforms:
    - name: fftresize
      params:
        size: [32, 32]
    - name: centercrop
      params:
        height: 32
        width: 32
    - name: clamp
      params:
        max_val: 5.0
    - name: normalize

    # - name: clamp
    #   params:
    #     max_val: 10.0
    # - name: logamplitude
    # - name: fft2
    # - name: randomhorizontalflip
    # - name: resize
    #   params:
    #     size: [32, 32]
                    
# Model configuration specific to reconstruction
model:
  activation: CReLU
  channels_width: 32
  class: AutoEncoder
  layer_mode: complex
  num_layers: 5
  num_blocks: 1
  normalization_layer: group
  downsampling_layer: Null
  upsampling_layer: transpose
  residual: True
  # gumbel_softmax: mean
  dropout: 0.0

  # Projection configuration - choose one of the following:
  
  # Option 1: Polynomial projection with custom order
  projection_layer: polynomial
  projection:
    order: 5  # Default is 3, this creates a 5th order polynomial
  
  # Option 2: MLP projection with custom architecture
  # projection_layer: MLP
  # projection:
  #   hidden_sizes: [8, 16, 8]  # Default is [8, 16]
  
  # Option 3: Amplitude projection (no additional config needed)
  # projection_layer: amplitude

  gumbel_tau:
    start_value: 0.001
    gamma: 0.1
    start_decay_epoch: 5
    min_value: 0.000001

evaluation:
  check_invariance: True  # Toggles circular shift check
  domain: spatial

# Override wandb project name for reconstruction
# Logging configuration
logging:
  logdir: ./logs
  wandb:
    entity: equivariant_cvnn
    project: sf_alos2
    name: reconstruction
# Loss configuration - using new generic naming
loss:
  name: MSE # Auto-selects ComplexMSELoss or MSELoss based on layer_mode
