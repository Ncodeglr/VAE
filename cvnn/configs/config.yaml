# Generic CVNN configuration - shared across all tasks

# Training configuration
nepochs: 200
mode: full
world_size: 4
seed: 4454

# # Early stopping to prevent overfitting
# early_stopping:
#   patience: 10
#   min_delta: 0.001
#   monitor: validation_loss

# Optimizer configuration
optim:
  algo: AdamW
  params:
    lr: 0.0005
    weight_decay: 0.001
    betas: [0.9, 0.999]
  max_norm: 1.0

# Scheduler configuration with ReduceLROnPlateau for adaptive learning
scheduler:
  name: ReduceLROnPlateau
  params:
    mode: min
    factor: 0.99
    patience: 5
    min_lr: 0.00005
  # name: CosineAnnealingLR
  # params:
  #   T_max: 100 # Matches total epochs
  #   eta_min: 0.00005 # Minimum learning rate
  #   last_epoch: -1
  # name: CosineAnnealingWarmRestarts
  # params:
  #   T_0: 10 # Initial period for warm restarts
  #   T_mult: 2 # Double the period after each restart
  #   eta_min: 0.005 # Minimum learning rate
  #   last_epoch: -1

# Warmup configuration
warmup:
  epochs: 5